<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upload PPT | PPT Library</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <nav class="navbar">
    <div class="nav-brand">📊 PPT Library</div>
    <div class="nav-links">
      <a href="index.html" class="active">Upload</a>
      <a href="library.html">Catalogue</a>
    </div>
  </nav>

  <main class="container">
    <h1>Upload Presentation</h1>
    <p class="subtitle">Add a PPT file along with its details below.</p>

    <form id="uploadForm" class="card">
      <label for="pptFile">Select PPT File *</label>
      <input type="file" id="pptFile" accept=".ppt,.pptx" required>
      <span id="fileNameDisplay" class="file-name"></span>

      <label for="title">Title *</label>
      <input type="text" id="title" placeholder="e.g. Q3 Marketing Strategy" required>

      <label for="description">Description</label>
      <textarea id="description" rows="3" placeholder="Short summary of what this PPT covers"></textarea>

      <label for="category">Category *</label>
      <select id="category" required>
        <option value="">-- Select Category --</option>
        <option value="Business">Business</option>
        <option value="Education">Education</option>
        <option value="Technology">Technology</option>
        <option value="Marketing">Marketing</option>
        <option value="Finance">Finance</option>
        <option value="Other">Other</option>
      </select>

      <label for="tags">Tags (comma separated)</label>
      <input type="text" id="tags" placeholder="e.g. strategy, growth, 2026">

      <label for="author">Uploader Name *</label>
      <input type="text" id="author" placeholder="Your name" required>

      <button type="submit" class="btn-primary">Upload PPT</button>
      <p id="statusMsg" class="status-msg"></p>
    </form>
  </main>

  <script src="script.js"></script>
</body>
</html>
